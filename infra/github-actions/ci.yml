name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  PNPM_VERSION: "9"

jobs:
  # ── JS / TS (Turborepo) ────────────────────────────────────────────────────
  js:
    name: JS/TS — lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # turbo needs HEAD^ to detect changed packages

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Type check
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build

  # ── Python (uv workspace) ──────────────────────────────────────────────────
  python:
    name: Python — lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy — API)
        run: uv run --package ankara-api mypy services/api/src

      - name: Tests — API
        run: uv run --package ankara-api pytest services/api/tests -v
        env:
          ENVIRONMENT: test
          POSTGRES_SERVER: localhost
          POSTGRES_USER: ankara
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ankara_test
          SECRET_KEY: test-secret-key-32-chars-minimum!!

      - name: Tests — Bots
        run: uv run --package ankara-bots pytest apps/bots/tests -v
        continue-on-error: true # bots tests may not exist yet

  # ── Dependency hygiene ────────────────────────────────────────────────────
  syncpack:
    name: syncpack — version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm syncpack list-mismatches

  # ── Docker build (main branch only) ───────────────────────────────────────
  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [js, python]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: false
          tags: ankara-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Bots image
        uses: docker/build-push-action@v6
        with:
          context: apps/bots
          push: false
          tags: ankara-bots:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
